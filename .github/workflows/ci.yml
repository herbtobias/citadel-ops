# Citadel Ops — continuous integration.
# Runs the full quality gate on every push to main and every PR:
# lint → format check → typecheck → build, plus the unit + integration test
# suites (the integration suite runs against a real Postgres service container)
# with coverage uploaded to Codecov.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# A newer push to the same ref cancels the older in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    # Postgres for the DB-gated integration suite. Mapped to 5433 to match the
    # project's local convention (docker-compose uses 5433 too).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: citadel
          POSTGRES_PASSWORD: citadel
          POSTGRES_DB: citadel
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U citadel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://citadel:citadel@localhost:5433/citadel
      TEST_DATABASE_URL: postgres://citadel:citadel@localhost:5433/citadel
      # Build/runtime needs a session secret; CI-only, not a real secret.
      NUXT_SESSION_PASSWORD: ci-only-session-password-32-characters

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Installs deps and runs `nuxt prepare` (postinstall) to generate the
      # .nuxt types + ESLint preset that eslint.config.mjs extends.
      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      # Apply migrations + seed so the integration suite finds the demo data.
      - name: Migrate database
        run: npm run db:migrate

      - name: Seed database
        run: npm run db:seed

      - name: Test (unit + integration) with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build
        run: npm run build

  # End-to-end smoke tests: drive the real app in a headless browser over the
  # critical human paths (auth + board). Separate job — it needs a browser and a
  # running dev server, neither of which the unit/integration job has.
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: citadel
          POSTGRES_PASSWORD: citadel
          POSTGRES_DB: citadel
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U citadel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://citadel:citadel@localhost:5433/citadel
      # E2E-only session secret (≥32 chars, see server/plugins/00.env-check).
      NUXT_SESSION_PASSWORD: e2e-only-session-password-32-characters

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Apply migrations so the dev server + globalSetup seed find their tables.
      # (globalSetup re-seeds to the known demo state at the start of the run.)
      - name: Migrate database
        run: npm run db:migrate

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
