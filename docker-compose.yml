# Citadel Ops — local full-stack dependencies.
# Postgres on 5433 to avoid clashing with other local Postgres instances (5432).
services:
  postgres:
    image: postgres:17-alpine
    container_name: citadel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: citadel
      POSTGRES_PASSWORD: citadel
      POSTGRES_DB: citadel
    ports:
      - '5433:5432'
    volumes:
      - citadel-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U citadel -d citadel']
      interval: 5s
      timeout: 5s
      retries: 10

  # Full-stack app (HQ + API + MCP). Opt-in via the "full" profile so plain
  # `docker compose up` stays Postgres-only for local `npm run dev`.
  #   docker compose --profile full up --build
  app:
    profiles: ['full']
    build: .
    container_name: citadel-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # The app talks to the postgres service inside the compose network.
      DATABASE_URL: postgres://citadel:citadel@postgres:5432/citadel
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD:-dev-session-password-change-me-min-32-chars}
      SEED_ON_START: '1' # run migrations + seed on first boot
    ports:
      - '3000:3000'

volumes:
  citadel-pgdata:
